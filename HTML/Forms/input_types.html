<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form>

                <!--Textfield-->
        <label for="textfield">textfield</label>
        <input type="text" name="textfield" id="textfield">

            <br/> <br> 

                <!--Button-->
        <label for="button">button to subscribe</label>
        <input type="button" id="button" value="subscribe">

        <br> <br>


        <!-- Radio button -->
        <label for="radio">Male</label>
        <input type="radio" id="radio" name="radio">
        
        <label for="radio1">Female</label>
        <input type="radio" id="radio1" name="radio1">

        <label for="radio2">Others</label>
        <input type="radio" id="radio2" name="radio2">

        <br><br>

        <label for="male">Male</label>
        <input type="radio" id="male" name="Gender">
        
        <label for="Female">Female</label>
        <input type="radio" id="Female" name="Gender">

        <label for="Others">Others</label>
        <input type="radio" id="Others" name="Gender">

        <br> <br>

        <!--Checkbox-->
        <label for="English">English</label>
        <input type="checkbox" id="English" name="language">
        
        <label for="Hindi">Hindi</label>
        <input type="checkbox" id="Hindi" name="language">

        <label for="Malyalam">Malyalam</label>
        <input type="checkbox" id="Malyalam" name="language">

        <br><br>

        <!--fie selector-->
        <label for="fileupload">Upload:</label>
        <input type="file" id="fileupload" value="choose file">

        <br>

        <label for="image">click submit button to submit</label>
        <input type="image" id="image" name="image" alt="click here" 
        src="submit_img.png" width="100" height="100">

        <br><br>

        <!--password attribute-->
        <label for="password">Enter password</label>
        <input type="password" name="password" id="password">

        <br><br>

        <!--Enter date-->
        <label for="date">Enter the date</label>
        <input type="date" id="date" name="date">
    </form>

</body>
</html>
